apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-code
data:
  app.py: |
    import hashlib, os, time, json, http.server, socketserver

    WORK_ITERATIONS = int(os.environ.get("WORK_ITERATIONS", "250"))

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok")
                return
            t0 = time.monotonic()
            data = b"x" * 1024
            for _ in range(WORK_ITERATIONS):
                data = hashlib.sha256(data).digest()
            elapsed_ms = (time.monotonic() - t0) * 1000
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            body = json.dumps({"status": "ok", "work_ms": round(elapsed_ms, 1)})
            self.wfile.write(body.encode())
        def log_message(self, format, *args):
            pass

    with socketserver.ThreadingTCPServer(("", 8080), Handler) as s:
        s.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-service
  labels:
    app: web-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-service
  template:
    metadata:
      labels:
        app: web-service
    spec:
      containers:
      - name: web
        image: python:3.10-slim
        command: ["python", "/app/app.py"]
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 250m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: WORK_ITERATIONS
          value: "250"
        volumeMounts:
        - name: app-code
          mountPath: /app
      volumes:
      - name: app-code
        configMap:
          name: web-app-code
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: web-service
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP

##
## Three workload profiles for the LLM autoscaler experiment:
##   1. CPU-intensive (hash computation)
##   2. Memory-bound (large allocations + scanning)
##   3. I/O-bound (disk writes + reads)
##

# --- Shared ConfigMap with all three workload handlers ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workload-code
data:
  cpu_app.py: |
    import hashlib, os, time, json, http.server, socketserver
    ITERS = int(os.environ.get("WORK_ITERATIONS", "500"))
    class H(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                self.send_response(200); self.end_headers(); self.wfile.write(b"ok"); return
            t0 = time.monotonic()
            data = b"x" * 4096
            for _ in range(ITERS):
                data = hashlib.sha256(data).digest()
            ms = (time.monotonic() - t0) * 1000
            self.send_response(200); self.send_header("Content-Type","application/json"); self.end_headers()
            self.wfile.write(json.dumps({"type":"cpu","work_ms":round(ms,1)}).encode())
        def log_message(self, *a): pass
    socketserver.ThreadingTCPServer(("",8080), H).serve_forever()

  mem_app.py: |
    import os, time, json, http.server, socketserver, random
    ALLOC_MB = int(os.environ.get("ALLOC_MB", "32"))
    class H(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                self.send_response(200); self.end_headers(); self.wfile.write(b"ok"); return
            t0 = time.monotonic()
            buf = bytearray(ALLOC_MB * 1024 * 1024)
            for i in range(0, len(buf), 4096):
                buf[i] = random.randint(0, 255)
            total = sum(buf[::4096])
            ms = (time.monotonic() - t0) * 1000
            del buf
            self.send_response(200); self.send_header("Content-Type","application/json"); self.end_headers()
            self.wfile.write(json.dumps({"type":"memory","work_ms":round(ms,1),"checksum":total}).encode())
        def log_message(self, *a): pass
    socketserver.ThreadingTCPServer(("",8080), H).serve_forever()

  io_app.py: |
    import os, time, json, http.server, socketserver, tempfile
    WRITE_KB = int(os.environ.get("WRITE_KB", "256"))
    class H(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                self.send_response(200); self.end_headers(); self.wfile.write(b"ok"); return
            t0 = time.monotonic()
            data = os.urandom(WRITE_KB * 1024)
            fd, path = tempfile.mkstemp()
            try:
                os.write(fd, data)
                os.fsync(fd)
                os.lseek(fd, 0, 0)
                _ = os.read(fd, WRITE_KB * 1024)
            finally:
                os.close(fd)
                os.unlink(path)
            ms = (time.monotonic() - t0) * 1000
            self.send_response(200); self.send_header("Content-Type","application/json"); self.end_headers()
            self.wfile.write(json.dumps({"type":"io","work_ms":round(ms,1)}).encode())
        def log_message(self, *a): pass
    socketserver.ThreadingTCPServer(("",8080), H).serve_forever()
---
# ======================== CPU-INTENSIVE ========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-cpu
  labels:
    app: workload-cpu
    workload-type: cpu
spec:
  replicas: 3
  selector:
    matchLabels:
      app: workload-cpu
  template:
    metadata:
      labels:
        app: workload-cpu
        workload-type: cpu
    spec:
      containers:
      - name: web
        image: python:3.10-slim
        command: ["python", "/app/cpu_app.py"]
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 250m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: WORK_ITERATIONS
          value: "500"
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: workload-code
---
apiVersion: v1
kind: Service
metadata:
  name: workload-cpu
spec:
  selector:
    app: workload-cpu
  ports:
  - port: 80
    targetPort: 8080
---
# ======================== MEMORY-BOUND ========================

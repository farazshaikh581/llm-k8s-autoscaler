# Second isolated instance of the CPU-bound workload app, for running a 2nd
# concurrent experiment stream (STREAM=B in run_richer_real.sh) without
# colliding with the primary workload-cpu deployment (worker1+worker2).
# Pinned to node0 via the autoscale-exp2 label/taint (see: kubectl label/taint
# commands used to prep node0). Reuses the existing workload-code ConfigMap.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-cpu-2
  labels:
    app: workload-cpu-2
    workload-type: cpu
spec:
  replicas: 3
  selector:
    matchLabels:
      app: workload-cpu-2
  template:
    metadata:
      labels:
        app: workload-cpu-2
        workload-type: cpu
    spec:
      nodeSelector:
        autoscale-exp2: "true"
      tolerations:
      - key: dedicated
        operator: Equal
        value: autoscale-exp2
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      containers:
      - name: web
        image: python:3.10-slim
        command: ["python", "/app/cpu_app.py"]
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 250m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: WORK_ITERATIONS
          value: "500"
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: workload-code
---
apiVersion: v1
kind: Service
metadata:
  name: workload-cpu-2
spec:
  selector:
    app: workload-cpu-2
  ports:
  - port: 80
    targetPort: 8080
